<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Okay Anagram</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#fff;color:#000;font-family:'Space Mono',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;z-index:999}
#loading h1{font-family:'Playfair Display',serif;font-size:clamp(26px,8vw,40px);font-weight:900;letter-spacing:-1px}
.ld-track{width:200px;height:1px;background:#ddd}
.ld-fill{height:100%;background:#000;width:0;transition:width .25s ease}
.ld-note{font-size:10px;letter-spacing:3px;color:#aaa}
#game{width:100%;max-width:460px;display:none;flex-direction:column;align-items:center;padding:20px 18px 60px}
.hdr{width:100%;border-bottom:2px solid #000;padding-bottom:11px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-end}
.hdr-title{font-family:'Playfair Display',serif;font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:-0.5px;line-height:1}
.hdr-rule{font-size:10px;letter-spacing:1.5px;color:#999;text-align:right;line-height:1.7}
.scorebar{width:100%;margin-bottom:16px}
.scorerow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.score-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1}
.score-lbl{font-size:9px;letter-spacing:2.5px;color:#bbb;margin-bottom:2px}
.score-rank{font-family:'Playfair Display',serif;font-style:italic;font-size:14px}
.prog-track{height:1px;background:#e0e0e0}
.prog-fill{height:100%;background:#000;transition:width .45s cubic-bezier(.4,0,.2,1)}
.hex-wrap{margin:10px 0 6px}
#hex-svg{width:min(270px,76vw);height:auto;display:block;touch-action:none}
.word-row{width:100%;max-width:360px;display:flex;align-items:center;gap:10px;margin:8px 0 4px}
.word-box{flex:1;min-height:50px;border-bottom:2px solid #000;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:clamp(20px,6vw,28px);font-weight:700;letter-spacing:6px;text-transform:uppercase;cursor:text;user-select:none;will-change:transform}
.word-box.empty{font-family:'Space Mono',monospace;font-size:11px;font-weight:400;letter-spacing:1px;color:#ccc;font-style:italic}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.word-box.do-shake{animation:shake .36s ease forwards}
.word-box.do-pop{animation:pop .28s ease forwards}
.del-btn{flex-shrink:0;width:44px;height:44px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.del-btn:active{background:#f0f0f0}
.msg{height:24px;line-height:24px;font-size:12px;letter-spacing:2px;text-align:center;font-family:'Playfair Display',serif}
.msg.err{color:#aaa;font-style:italic}
.msg.ok{color:#000;font-weight:700}
.btn-row{display:flex;gap:8px;margin:10px 0 16px}
.btn{padding:10px 14px;border:1px solid #000;background:#fff;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
.btn:active{background:#eee}
.btn-solid{background:#000;color:#fff}
.btn-solid:active{background:#333}
.found-wrap{width:100%;border-top:1px solid #e8e8e8;padding-top:16px;margin-top:4px}
.found-hdr{font-size:9px;letter-spacing:3px;color:#ccc;margin-bottom:12px}
.found-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{border:1px solid #000;padding:3px 9px;font-family:'Playfair Display',serif;font-size:12px;letter-spacing:1.5px;animation:chipIn .18s ease}
@keyframes chipIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.genius{width:100%;border:2px solid #000;padding:28px 20px;text-align:center;margin-top:28px}
.genius-word{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;letter-spacing:8px}
.genius-sub{font-size:10px;letter-spacing:3px;color:#999;margin-top:10px}
.dict-note{font-size:9px;letter-spacing:2px;color:#bbb;text-align:center;margin-top:8px;line-height:1.6}
</style>
</head>
<body>

<div id="loading">
  <h1>Okay&nbsp;Anagram</h1>
  <div class="ld-track"><div class="ld-fill" id="ld-fill"></div></div>
  <div class="ld-note" id="ld-note">LOADING</div>
</div>

<div id="game">
  <div class="hdr">
    <div class="hdr-title">Okay Anagram</div>
    <div class="hdr-rule">center letter required<br>4+ letters &middot; real words only</div>
  </div>
  <div class="scorebar">
    <div class="scorerow">
      <div><div class="score-lbl">SCORE</div><div class="score-n" id="s-score">0</div></div>
      <div style="text-align:center"><div class="score-lbl">FOUND</div><div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700" id="s-words">&#8212; / &#8212;</div></div>
      <div style="text-align:right"><div class="score-lbl">RANK</div><div class="score-rank" id="s-rank">Beginner</div></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="s-prog" style="width:0%"></div></div>
  </div>
  <div class="hex-wrap"><svg id="hex-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="word-row">
    <div class="word-box empty" id="w-disp">tap letters above</div>
    <button class="del-btn" onclick="deleteLetter()" aria-label="Delete">&#9003;</button>
  </div>
  <div class="msg" id="w-msg"></div>
  <div class="btn-row">
    <button class="btn" onclick="doShuffle()">Shuffle</button>
    <button class="btn btn-solid" onclick="submitWord()">Enter</button>
    <button class="btn" onclick="newGame()">New Game</button>
  </div>
  <div class="found-wrap" id="found-wrap" style="display:none">
    <div class="found-hdr">FOUND WORDS</div>
    <div class="found-grid" id="found-grid"></div>
  </div>
  <div id="genius-area"></div>
  <div class="dict-note" id="dict-note"></div>
</div>

// ── LOAD ─────────────────────────────────────────────────
const SOURCES=[
  'https://cdn.jsdelivr.net/gh/dwyl/english-words/words_alpha.txt',
  'https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt'
];

async function boot(){
  // Check cache
  try{
    const c=sessionStorage.getItem('oa_v5');
    if(c){allWords=JSON.parse(c);launch('full');return;}
  }catch(e){}

  // Try CDN sources
  for(let i=0;i<SOURCES.length;i++){
    try{
      setNote(i===0?'LOADING DICTIONARY\u2026':'TRYING BACKUP\u2026');
      const res=await ftch(SOURCES[i],12000);
      if(!res.ok) continue;
      const cl=+res.headers.get('content-length')||0;
      const rdr=res.body.getReader();
      const dec=new TextDecoder();
      let raw='',got=0;
      while(true){
        const{done,value}=await rdr.read();
        if(done)break;
        got+=value.length; raw+=dec.decode(value,{stream:true});
        if(cl>0)setFill(got/cl*75);
      }
      setFill(82);setNote('PROCESSING\u2026');
      await tick();
      const words=[];
      for(const ln of raw.split('\n')){
        const w=ln.trim().toLowerCase();
        if(w.length>=4&&w.length<=9&&/^[a-z]+$/.test(w)&&new Set(w).size<=7)
          words.push(w);
      }
      allWords=words;
      try{sessionStorage.setItem('oa_v5',JSON.stringify(words));}catch(e){}
      setFill(100);setNote('READY');
      await sleep(250);
      launch('full');
      return;
    }catch(e){}
  }

  // Fallback to embedded list
  setNote('USING BUILT-IN DICTIONARY');
  setFill(90);
  await tick();
  allWords=E.filter(w=>w.length>=4&&w.length<=9&&/^[a-z]+$/.test(w)&&new Set(w).size<=7);
  setFill(100);
  await sleep(300);
  launch('fallback');
}

async function ftch(url,ms){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}

const setFill=p=>document.getElementById('ld-fill').style.width=p+'%';
const setNote=t=>document.getElementById('ld-note').textContent=t;
const tick=()=>new Promise(r=>setTimeout(r,0));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function launch(mode){
  document.getElementById('loading').style.display='none';
  document.getElementById('game').style.display='flex';
  if(mode==='fallback'){
    document.getElementById('dict-note').textContent=
      'OFFLINE MODE \u2014 USING BUILT-IN WORD LIST';
  }
  newGame();
}

// ── PUZZLE ───────────────────────────────────────────────
function shuffle(a){
  a=[...a];
  for(let i=a.length-1;i>0;i--){
    const j=0|(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function generatePuzzle(){
  // Shuffle the word list and try each until we get enough valid words
  const candidates=shuffle(PUZZLE_WORDS);
  for(const word of candidates){
    const ls=[...new Set(word.split(''))]; // unique letters (should be 7)
    if(ls.length!==7) continue;
    const lSet=new Set(ls);
    // Pick key letter: prefer a common letter that yields good results
    // Try each letter as key, pick the one with most valid words
    let bestK=null,bestV=null,bestN=0;
    for(const k of ls){
      const v=[];
      for(const w of allWords){
        let hasK=false,ok=true;
        for(const c of w){if(!lSet.has(c)){ok=false;break;}if(c===k)hasK=true;}
        if(ok&&hasK)v.push(w);
      }
      if(v.length>bestN){bestN=v.length;bestK=k;bestV=v;}
    }
    const min=allWords.length<3000?8:18;
    if(bestN>=min) return{ls,k:bestK,v:bestV};
  }
  return null;
}

function newGame(){
  const p=generatePuzzle();
  if(!p){alert('Puzzle generation failed. Please refresh.');return;}
  letters=p.ls; keyLetter=p.k; validSet=new Set(p.v);
  found=[]; typed=''; score=0;
  maxScore=p.v.reduce((s,w)=>s+pts(w),0);
  ringOrder=shuffle(letters.filter(l=>l!==keyLetter));
  renderHex(); updateStatus(); setDisp(''); clearMsg();
  document.getElementById('found-wrap').style.display='none';
  document.getElementById('found-grid').innerHTML='';
  document.getElementById('genius-area').innerHTML='';
}

// ── SCORING ──────────────────────────────────────────────
function pts(w){return w.length===4?1:w.length;}
function rank(pct){
  let r=RANKS[0][1];
  for(const[t,n]of RANKS)if(pct>=t)r=n;
  return r;
}

// ── HEX SVG ──────────────────────────────────────────────
function hpts(cx,cy,s){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/3*i;
    return`${(cx+s*Math.cos(a)).toFixed(2)},${(cy+s*Math.sin(a)).toFixed(2)}`;
  }).join(' ');
}

function renderHex(){
  const svg=document.getElementById('hex-svg');
  svg.innerHTML='';
  const mk=(x,y,l,isKey)=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points',hpts(x,y,HEX_S));
    p.setAttribute('fill',isKey?'#000':'#fff');
    p.setAttribute('stroke','#000');
    p.setAttribute('stroke-width','1.5');
    p.style.transition='fill .1s';
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',x);t.setAttribute('y',y);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');
    t.setAttribute('font-family',"'Space Mono',monospace");
    t.setAttribute('font-size','21');
    t.setAttribute('font-weight','700');
    t.setAttribute('fill',isKey?'#fff':'#000');
    t.setAttribute('pointer-events','none');
    t.textContent=l.toUpperCase();
    g.appendChild(p);g.appendChild(t);
    g.addEventListener('pointerdown',e=>{
      e.preventDefault();
      p.setAttribute('fill',isKey?'#2a2a2a':'#e0e0e0');
      addLetter(l);
      setTimeout(()=>p.setAttribute('fill',isKey?'#000':'#fff'),150);
    });
    svg.appendChild(g);
  };
  ringOrder.forEach((l,i)=>{
    const a=Math.PI/3*i-Math.PI/2;
    mk(CX+RING_R*Math.cos(a),CY+RING_R*Math.sin(a),l,false);
  });
  mk(CX,CY,keyLetter,true);
}

function doShuffle(){ringOrder=shuffle(ringOrder);renderHex();}

// ── INPUT ────────────────────────────────────────────────
function addLetter(l){typed+=l;setDisp(typed);}
function deleteLetter(){if(typed.length){typed=typed.slice(0,-1);setDisp(typed);}}
function setDisp(w){
  const el=document.getElementById('w-disp');
  if(!w){el.textContent='tap letters above';el.classList.add('empty');}
  else{el.textContent=w.toUpperCase();el.classList.remove('empty');}
}

// ── SUBMIT ───────────────────────────────────────────────
function submitWord(){
  const w=typed.toLowerCase();
  const bad=msg=>{flashMsg(msg,'err');anim(false);typed='';setDisp('');};
  if(!w)return;
  if(w.length<4)return bad('4 letters minimum');
  if(!w.includes(keyLetter))return bad('Must include \u201c'+keyLetter.toUpperCase()+'\u201d');
  if([...w].some(c=>!new Set(letters).has(c)))return bad('Not in today\u2019s letters');
  if(found.includes(w))return bad('Already found!');
  if(!validSet.has(w))return bad('Not a word');
  const p=pts(w);score+=p;
  found=[...found,w].sort();
  typed='';setDisp('');
  flashMsg('+'+p,'ok');anim(true);
  updateStatus();renderFound();
  document.getElementById('found-wrap').style.display='block';
  if(found.length===validSet.size)setTimeout(genius,600);
}

function updateStatus(){
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-words').textContent=found.length+' / '+validSet.size;
  const pct=maxScore?score/maxScore:0;
  document.getElementById('s-prog').style.width=Math.min(pct,1)*100+'%';
  document.getElementById('s-rank').textContent=rank(pct);
}

function renderFound(){
  const g=document.getElementById('found-grid');
  g.innerHTML='';
  for(const w of found){
    const c=document.createElement('span');
    c.className='chip';c.textContent=w.toUpperCase();
    g.appendChild(c);
  }
}

function genius(){
  document.getElementById('genius-area').innerHTML=
    '<div class="genius">'+
    '<div class="genius-word">GENIUS</div>'+
    '<div class="genius-sub">ALL '+validSet.size+' WORDS &mdash; '+score+' POINTS</div>'+
    '<button class="btn btn-solid" style="margin-top:20px" onclick="newGame()">Play Again</button>'+
    '</div>';
}

let msgT;
function flashMsg(txt,cls){
  clearTimeout(msgT);
  const el=document.getElementById('w-msg');
  el.textContent=txt;el.className='msg '+(cls||'');
  if(txt)msgT=setTimeout(clearMsg,1900);
}
function clearMsg(){
  const el=document.getElementById('w-msg');
  el.textContent='';el.className='msg';
}
function anim(ok){
  const el=document.getElementById('w-disp');
  el.classList.remove('do-shake','do-pop');
  void el.offsetWidth;
  el.classList.add(ok?'do-pop':'do-shake');
  setTimeout(()=>el.classList.remove('do-shake','do-pop'),400);
}

boot();
