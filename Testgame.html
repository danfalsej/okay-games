<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CHROMATIC</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  background:#03030f;
  display:flex;align-items:center;justify-content:center;
  min-height:100dvh;overflow:hidden;
  touch-action:none;user-select:none;-webkit-user-select:none;
  font-family:'Courier New',monospace;
}
#wrap{position:relative;width:min(100vw,150dvh)}
canvas{display:block;width:100%;height:auto;cursor:none}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  padding:10px 18px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;
}
.hb{text-align:center}
.hl{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.22);text-transform:uppercase;margin-bottom:2px}
.hv{font-size:21px;font-weight:700;line-height:1}
#hs{color:#00e5f5;text-shadow:0 0 14px #00e5f5}
#hl2{color:#bf5af2;text-shadow:0 0 14px #bf5af2}
.lr{display:flex;gap:5px;justify-content:center;padding-top:5px}
.ld{width:8px;height:8px;border-radius:50%;background:#ff2d55;box-shadow:0 0 7px #ff2d55;transition:all .3s}
.ld.off{background:rgba(255,255,255,.1);box-shadow:none}

/* OVERLAY */
#ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(3,3,15,.93);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:20;opacity:1;transition:opacity .5s;
}
#ov.gone{opacity:0;pointer-events:none}
.oe{font-size:9px;letter-spacing:5px;color:rgba(0,229,245,.45);text-transform:uppercase;margin-bottom:10px}
.ot{font-size:clamp(30px,7vw,64px);letter-spacing:8px;color:#fff;text-transform:uppercase;
    text-shadow:0 0 40px #00e5f5,0 0 90px rgba(0,229,245,.2);margin-bottom:6px}
.os{font-size:clamp(8px,1.4vw,11px);letter-spacing:4px;color:rgba(255,255,255,.2);text-transform:uppercase;margin-bottom:36px}
#osc{font-size:clamp(13px,2.5vw,18px);color:rgba(255,255,255,.45);letter-spacing:3px;margin-bottom:26px}
.otips{font-size:clamp(7px,1.2vw,10px);line-height:2.1;letter-spacing:2px;
       color:rgba(255,255,255,.16);text-align:center;text-transform:uppercase;margin-bottom:32px}
#ob{
  font:400 clamp(9px,1.5vw,11px) 'Courier New',monospace;
  letter-spacing:5px;text-transform:uppercase;color:#00e5f5;
  background:transparent;border:1px solid rgba(0,229,245,.42);
  padding:clamp(10px,2vw,14px) clamp(22px,5vw,42px);
  cursor:pointer;transition:background .2s,box-shadow .2s,border-color .2s;
  box-shadow:0 0 18px rgba(0,229,245,.1),inset 0 0 18px rgba(0,229,245,.04);
}
#ob:hover,#ob:active{
  background:rgba(0,229,245,.12);border-color:#00e5f5;
  box-shadow:0 0 28px rgba(0,229,245,.3),inset 0 0 18px rgba(0,229,245,.08);
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="900" height="600"></canvas>

  <div id="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" id="hs">0</div></div>
    <div class="hb"><div class="hl">Lives</div><div class="lr">
      <div class="ld" id="l0"></div><div class="ld" id="l1"></div><div class="ld" id="l2"></div>
    </div></div>
    <div class="hb"><div class="hl">Level</div><div class="hv" id="hl2">1</div></div>
  </div>

  <div id="ov">
    <div class="oe">CHROMATIC</div>
    <div class="ot" id="otitle">CHROMATIC</div>
    <div class="os" id="osub">Color Chain Reaction</div>
    <div id="osc" style="display:none"></div>
    <div class="otips" id="otips">
      CLICK · TAP ── FIRE<br>
      RIGHT CLICK · S ── SWAP COLORS<br>
      MATCH 3 OR MORE TO CLEAR
    </div>
    <button id="ob">INITIALIZE</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
const W = 900, H = 600;
const R = 15, D = R * 2;          // ball radius / diameter
const PROJ_SPD = 720;              // projectile pixels/sec

const COLORS = [
  {fill:'#ff2d55',dark:'#7a1025',light:'#ff7a95',glow:'#ff2d55'},
  {fill:'#00e5f5',dark:'#006070',light:'#7ff4ff',glow:'#00e5f5'},
  {fill:'#ffd60a',dark:'#7a6200',light:'#ffe780',glow:'#ffd60a'},
  {fill:'#30d158',dark:'#185c30',light:'#8eeaa0',glow:'#30d158'},
  {fill:'#bf5af2',dark:'#5c1a80',light:'#d898f8',glow:'#bf5af2'},
  {fill:'#ff9f0a',dark:'#7a4500',light:'#ffbf60',glow:'#ff9f0a'},
];

// Spiral path – ends at DRAIN
const WAYPOINTS = [
  {x:-32, y:110},{x:800,y:110},{x:800,y:490},{x:100,y:490},
  {x:100, y:210},{x:700,y:210},{x:700,y:392},{x:200,y:392},
  {x:200, y:310},{x:460,y:310},   // ← DRAIN
];
const DX=460,DY=310;  // drain position
const SX=450,SY=550;  // shooter position

// ═══════════════════════════════════════════
//  PATH ENGINE
// ═══════════════════════════════════════════
class Path {
  constructor(pts){
    this.segs=[];this.len=0;
    for(let i=0;i<pts.length-1;i++){
      const a=pts[i],b=pts[i+1];
      const dx=b.x-a.x,dy=b.y-a.y,sl=Math.hypot(dx,dy);
      this.segs.push({x0:a.x,y0:a.y,dx,dy,len:sl,angle:Math.atan2(dy,dx),cum:this.len});
      this.len+=sl;
    }
  }
  at(s){
    s=Math.max(0,Math.min(this.len,s));
    let lo=0,hi=this.segs.length-1;
    while(lo<hi){const m=(lo+hi+1)>>1;if(this.segs[m].cum<=s)lo=m;else hi=m-1;}
    const sg=this.segs[lo],t=sg.len>0?(s-sg.cum)/sg.len:0;
    return{x:sg.x0+t*sg.dx,y:sg.y0+t*sg.dy,angle:sg.angle};
  }
  sample(n){const r=[];for(let i=0;i<=n;i++)r.push(this.at(i/n*this.len));return r;}
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let path,pts;
let chain=[];    // {s,ci,x,y} – chain[0]=front (highest s)
let proj=null;   // {x,y,vx,vy,ci,trail:[]}
let sparks=[];   // particles
let score=0,level=1,lives=3;
let nColors=3,chainSpd=28,spawnInt=0.5;
let spawnT=0,spawned=0,toSpawn=0;
let curCI=0,nxtCI=1;
let ang=-Math.PI/2;
let mx=W/2,my=H;
let flashA=0,flashC='#fff';
let gstate='menu';  // menu|play|leveldone|over|win
let dangerA=0;

// ═══════════════════════════════════════════
//  CANVAS + GRID PATTERN
// ═══════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let gridPat;
(function(){
  const o=Object.assign(document.createElement('canvas'),{width:40,height:40});
  const g=o.getContext('2d');
  g.strokeStyle='rgba(255,255,255,.02)';g.lineWidth=1;
  g.beginPath();g.moveTo(40,0);g.lineTo(40,40);g.moveTo(0,40);g.lineTo(40,40);g.stroke();
  gridPat=ctx.createPattern(o,'repeat');
})();

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
function lp(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*W/r.width,y:(cy-r.top)*H/r.height};}
function aim(cx,cy){const p=lp(cx,cy);mx=p.x;my=p.y;ang=Math.atan2(my-SY,mx-SX);}
function fire(){
  if(proj||gstate!=='play')return;
  proj={x:SX,y:SY,vx:Math.cos(ang)*PROJ_SPD,vy:Math.sin(ang)*PROJ_SPD,ci:curCI,trail:[]};
  curCI=nxtCI;nxtCI=Math.floor(Math.random()*nColors);
}
function swap(){if(gstate==='play')[curCI,nxtCI]=[nxtCI,curCI];}

canvas.addEventListener('mousemove',e=>aim(e.clientX,e.clientY));
canvas.addEventListener('click',()=>fire());
canvas.addEventListener('contextmenu',e=>{e.preventDefault();swap();});
canvas.addEventListener('touchstart',e=>{e.preventDefault();aim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();aim(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();fire();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();fire();}
  if(e.code==='KeyS'||e.code==='ShiftLeft')swap();
});

// ═══════════════════════════════════════════
//  GAME CONTROL
// ═══════════════════════════════════════════
function initLevel(){
  path=new Path(WAYPOINTS);pts=path.sample(500);
  chain=[];sparks=[];proj=null;
  spawnT=0;spawned=0;
  toSpawn=42+level*8;
  chainSpd=26+(level-1)*3;
  spawnInt=Math.max(0.32,0.54-(level-1)*0.04);
  nColors=Math.min(3+(level-1),6);
  curCI=Math.floor(Math.random()*nColors);
  nxtCI=Math.floor(Math.random()*nColors);
  dangerA=0;
}
function startGame(){score=0;level=1;lives=3;gstate='play';initLevel();updateHUD();hideOv();}
function flash(c,a){flashC=c;flashA=a;}

function loseLife(){
  lives--;flash('#ff2d55',.55);
  chain=[];proj=null;spawned=0;spawnT=0;
  updateHUD();
  if(lives<=0)setTimeout(()=>{gstate='over';showOv('GAME OVER','',`SCORE   ${score.toLocaleString()}`,'RETRY',false);},600);
}

function trySpawn(){
  const last=chain.length>0?chain[chain.length-1].s:D+1;
  if(last<D)return;
  const b={s:0,ci:Math.floor(Math.random()*nColors)};
  const p=path.at(0);b.x=p.x;b.y=p.y;
  chain.push(b);spawned++;
}

// ═══════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════
function update(dt){
  // Spawn
  if(spawned<toSpawn){spawnT-=dt;if(spawnT<=0){trySpawn();spawnT=spawnInt;}}

  // Move chain
  if(chain.length>0){
    for(const b of chain)b.s+=chainSpd*dt;
    // Enforce spacing
    for(let i=1;i<chain.length;i++){const mx2=chain[i-1].s-D;if(chain[i].s>mx2)chain[i].s=mx2;}
    // Game over
    if(chain[0].s>=path.len){loseLife();return;}
    // Update positions
    for(const b of chain){const p=path.at(b.s);b.x=p.x;b.y=p.y;}
    // Danger indicator
    const fd=path.len-chain[0].s;
    dangerA=fd<260?(260-fd)/260:0;
  }

  // Projectile
  if(proj){
    proj.trail.push({x:proj.x,y:proj.y});
    if(proj.trail.length>10)proj.trail.shift();
    proj.x+=proj.vx*dt;proj.y+=proj.vy*dt;
    if(proj.x<-60||proj.x>W+60||proj.y<-60||proj.y>H+60)proj=null;
    else checkHit();
  }

  // Particles
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=290*dt;s.life-=dt;
    if(s.life<=0)sparks.splice(i,1);
  }

  flashA=Math.max(0,flashA-dt*3.5);

  // Win check
  if(gstate==='play'&&spawned>=toSpawn&&chain.length===0&&!proj){
    flash('#00e5f5',.28);gstate='leveldone';
    setTimeout(()=>{
      if(level>=5){gstate='win';showOv('YOU WIN','',`SCORE   ${score.toLocaleString()}`,'PLAY AGAIN',false);}
      else{level++;gstate='play';initLevel();updateHUD();}
    },900);
  }
}

function checkHit(){
  let best=-1,bd=D;
  for(let i=0;i<chain.length;i++){
    const dx=proj.x-chain[i].x,dy=proj.y-chain[i].y,d=Math.hypot(dx,dy);
    if(d<bd){bd=d;best=i;}
  }
  if(best===-1)return;
  const hit=chain[best],pa=path.at(hit.s);
  const dot=(proj.x-hit.x)*Math.cos(pa.angle)+(proj.y-hit.y)*Math.sin(pa.angle);
  const ins=dot>=0?best:best+1;

  let ns;
  if(ins===0)ns=chain[0].s+D;
  else if(ins>=chain.length)ns=chain[chain.length-1].s-D;
  else ns=chain[ins-1].s-D*0.5;

  const nb={s:ns,ci:proj.ci,x:proj.x,y:proj.y};
  chain.splice(ins,0,nb);proj=null;

  // Fix spacing
  for(let i=ins-1;i>=0;i--){const n=chain[i+1].s+D;if(chain[i].s<n)chain[i].s=n;else break;}
  for(let i=ins+1;i<chain.length;i++){const n=chain[i-1].s-D;if(chain[i].s>n)chain[i].s=n;else break;}
  for(const b of chain){const p=path.at(b.s);b.x=p.x;b.y=p.y;}

  checkMatches(ins);
}

function checkMatches(idx){
  if(!chain.length)return;
  idx=Math.min(Math.max(idx,0),chain.length-1);
  const ci=chain[idx].ci;
  let lo=idx,hi=idx;
  while(lo>0&&chain[lo-1].ci===ci)lo--;
  while(hi<chain.length-1&&chain[hi+1].ci===ci)hi++;
  if(hi-lo+1<3)return;
  const removed=chain.splice(lo,hi-lo+1);
  score+=removed.length*10*level;updateHUD();
  for(const b of removed)emit(b.x,b.y,COLORS[b.ci].fill,removed.length);
  flash(COLORS[ci].glow,.18);
  if(lo>0&&lo<chain.length&&chain[lo-1].ci===chain[lo].ci)checkMatches(lo);
}

function emit(x,y,col,count){
  const n=8+Math.min(count*2,14);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=60+Math.random()*230;
    const life=0.3+Math.random()*0.55;
    sparks.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-30,col,r:1.5+Math.random()*2.5,life,ml:life});
  }
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(now){
  const t=now/1000;
  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle='#03030f';ctx.fillRect(0,0,W,H);
  ctx.fillStyle=gridPat;ctx.fillRect(0,0,W,H);

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,H*.12,W/2,H/2,H*.88);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // Subtle bottom glow where shooter sits
  const sg=ctx.createRadialGradient(SX,SY,0,SX,SY,120);
  sg.addColorStop(0,'rgba(0,180,220,.04)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);

  if(pts)drawTube();
  drawDrain(t);

  // Chain (back → front)
  for(let i=chain.length-1;i>=0;i--)if(chain[i].x!==undefined)drawBall(chain[i].x,chain[i].y,chain[i].ci);

  // Projectile + trail
  if(proj){
    const c=COLORS[proj.ci];
    for(let i=0;i<proj.trail.length;i++){
      const f=i/proj.trail.length,pt=proj.trail[i];
      ctx.globalAlpha=f*.32;ctx.shadowColor=c.glow;ctx.shadowBlur=7;
      ctx.beginPath();ctx.arc(pt.x,pt.y,R*(.15+f*.7),0,Math.PI*2);
      ctx.fillStyle=c.fill;ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    drawBall(proj.x,proj.y,proj.ci);
  }

  drawShooter(t);
  drawCursor();

  // Particles
  ctx.save();
  for(const s of sparks){
    const a=s.life/s.ml;
    ctx.globalAlpha=a*.9;ctx.shadowColor=s.col;ctx.shadowBlur=7;
    ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.r*a,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();

  if(gstate==='play'||gstate==='leveldone')drawProgress();

  // Flash
  if(flashA>0){ctx.globalAlpha=flashA;ctx.fillStyle=flashC;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}

  // Danger border pulse
  if(dangerA>0){
    const dp=dangerA*(0.5+0.5*Math.sin(t*12));
    ctx.globalAlpha=dp*.38;ctx.strokeStyle='#ff2d55';ctx.lineWidth=5;
    ctx.strokeRect(2.5,2.5,W-5,H-5);ctx.globalAlpha=1;
  }
}

function drawTube(){
  function trace(){
    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  }
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  // Outer glow halo
  trace();ctx.strokeStyle='rgba(0,200,230,.04)';ctx.lineWidth=D*2+20;ctx.stroke();
  // Dark body
  trace();ctx.strokeStyle='#070719';ctx.lineWidth=D*2+2;ctx.stroke();
  // Bright border
  trace();ctx.strokeStyle='rgba(0,200,230,.13)';ctx.lineWidth=D*2+2;ctx.stroke();
  // Inner dark fill
  trace();ctx.strokeStyle='#040413';ctx.lineWidth=D*2-2;ctx.stroke();
  // Subtle center line
  trace();ctx.strokeStyle='rgba(0,200,230,.035)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}

function drawDrain(t){
  const p=0.5+0.5*Math.sin(t*2.8);
  for(let i=3;i>=0;i--){
    ctx.beginPath();ctx.arc(DX,DY,14+i*9+p*5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,45,85,${(0.26-i*.06)*p})`;ctx.fill();
  }
  const g=ctx.createRadialGradient(DX,DY,0,DX,DY,12);
  g.addColorStop(0,'#ff2d55');g.addColorStop(1,'#6e0019');
  ctx.beginPath();ctx.arc(DX,DY,12,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.arc(DX,DY,5,0,Math.PI*2);ctx.fillStyle='#03030f';ctx.fill();
  ctx.globalAlpha=0.28+0.18*p;ctx.fillStyle='#ff2d55';
  ctx.font='7px Courier New';ctx.textAlign='center';
  ctx.fillText('DRAIN',DX,DY+24);ctx.globalAlpha=1;
}

function drawBall(x,y,ci,alpha){
  if(alpha!==undefined)ctx.globalAlpha=alpha;
  const c=COLORS[ci];
  ctx.shadowColor=c.glow;ctx.shadowBlur=11;
  const g=ctx.createRadialGradient(x-R*.3,y-R*.35,R*.05,x,y,R);
  g.addColorStop(0,c.light);g.addColorStop(.45,c.fill);g.addColorStop(1,c.dark);
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.shadowBlur=0;
  // Specular highlight
  const sh=ctx.createRadialGradient(x-R*.3,y-R*.35,0,x-R*.28,y-R*.3,R*.42);
  sh.addColorStop(0,'rgba(255,255,255,.52)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(x,y,R,0,Math.PI*2);ctx.fillStyle=sh;ctx.fill();
  if(alpha!==undefined)ctx.globalAlpha=1;
}

function drawShooter(t){
  const p=0.5+0.5*Math.sin(t*1.9);
  ctx.save();

  // Base ambient glow
  const bg=ctx.createRadialGradient(SX,SY,0,SX,SY,42);
  bg.addColorStop(0,`rgba(0,220,255,${.07+.04*p})`);bg.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(SX,SY,42,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

  // Outer ring
  ctx.beginPath();ctx.arc(SX,SY,35,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,220,255,${.1+.07*p})`;ctx.lineWidth=1;ctx.stroke();
  // Inner ring
  ctx.beginPath();ctx.arc(SX,SY,25,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,220,255,${.2+.09*p})`;ctx.lineWidth=1.5;ctx.stroke();

  // Rotating tick marks
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2+t*.35,big=i%3===0;
    ctx.beginPath();
    ctx.moveTo(SX+Math.cos(a)*27,SY+Math.sin(a)*27);
    ctx.lineTo(SX+Math.cos(a)*(27+(big?6:3)),SY+Math.sin(a)*(27+(big?6:3)));
    ctx.strokeStyle=big?'rgba(0,220,255,.44)':'rgba(0,220,255,.16)';
    ctx.lineWidth=big?1.5:1;ctx.stroke();
  }

  // Barrel
  const bx1=SX+Math.cos(ang)*17,by1=SY+Math.sin(ang)*17;
  const bx2=SX+Math.cos(ang)*34,by2=SY+Math.sin(ang)*34;
  ctx.shadowColor='#00e5f5';ctx.shadowBlur=14;
  ctx.strokeStyle='#00e5f5';ctx.lineWidth=7;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(bx1,by1);ctx.lineTo(bx2,by2);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bx1,by1);ctx.lineTo(bx2,by2);ctx.stroke();
  ctx.shadowBlur=0;

  // Current ball in shooter
  drawBall(SX,SY,curCI);

  // Next ball preview
  const na=ang+Math.PI/2;
  const npx=Math.max(R+5,Math.min(W-R-5,SX+Math.cos(na)*46));
  const npy=Math.max(R+5,Math.min(H-R-5,SY+Math.sin(na)*46));
  drawBall(npx,npy,nxtCI,.5);
  ctx.globalAlpha=.18;ctx.fillStyle='#fff';ctx.font='7px Courier New';
  ctx.textAlign='center';ctx.fillText('NEXT',npx,npy+R+9);ctx.globalAlpha=1;

  ctx.restore();
}

function drawCursor(){
  const cs=12,cg=5;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.42)';ctx.lineWidth=1;
  ctx.shadowColor='#00e5f5';ctx.shadowBlur=9;
  ctx.beginPath();
  ctx.moveTo(mx-cs,my);ctx.lineTo(mx-cg,my);
  ctx.moveTo(mx+cg,my);ctx.lineTo(mx+cs,my);
  ctx.moveTo(mx,my-cs);ctx.lineTo(mx,my-cg);
  ctx.moveTo(mx,my+cg);ctx.lineTo(mx,my+cs);
  ctx.stroke();
  ctx.restore();
}

function drawProgress(){
  const rem=Math.max(0,(toSpawn-spawned)+chain.length);
  const pct=1-rem/toSpawn;
  const bx=10,by=H-5,bw=W-20,bh=2;
  ctx.fillStyle='rgba(255,255,255,.04)';ctx.fillRect(bx,by,bw,bh);
  if(pct>0){
    const pg=ctx.createLinearGradient(bx,0,bx+bw*pct,0);
    pg.addColorStop(0,'#00e5f5');pg.addColorStop(.5,'#bf5af2');pg.addColorStop(1,'#ff9f0a');
    ctx.fillStyle=pg;ctx.fillRect(bx,by,bw*pct,bh);
  }
}

// ═══════════════════════════════════════════
//  HUD + OVERLAY
// ═══════════════════════════════════════════
function updateHUD(){
  document.getElementById('hs').textContent=score.toLocaleString();
  document.getElementById('hl2').textContent=level;
  for(let i=0;i<3;i++)document.getElementById('l'+i).className='ld'+(i<lives?'':' off');
}

function showOv(title,sub,sc,btn,tips){
  document.getElementById('otitle').textContent=title;
  document.getElementById('osub').textContent=sub;
  const se=document.getElementById('osc');se.textContent=sc;se.style.display=sc?'':'none';
  document.getElementById('ob').textContent=btn;
  document.getElementById('otips').style.display=tips?'':'none';
  const ov=document.getElementById('ov');
  ov.style.display='flex';ov.offsetHeight;ov.classList.remove('gone');
}

function hideOv(){
  const ov=document.getElementById('ov');
  ov.classList.add('gone');
  setTimeout(()=>{ov.style.display='none';},500);
}

document.getElementById('ob').addEventListener('click',startGame);

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
let lastT=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,1/20);
  lastT=now;
  if(gstate==='play')update(dt);
  render(now);
}
requestAnimationFrame(loop);
</script>
